<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Sand Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-panel">
            <div id="folder-tabs">
                <!-- Tabs populated by JS -->
            </div>
            <div id="element-palette">
                <!-- Elements populated by JS -->
            </div>
        </div>
    </div>

    <div id="debug-info">FPS: <span id="fps-display">0</span></div>

    <div id="simulation-controls">
        <button id="play-pause-btn" class="pixel-btn" title="Play/Pause">
            <svg id="play-pause-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24" height="24" shape-rendering="crispEdges">
                <path id="play-pause-path" fill="white" d="M4,3 h2 v10 h-2 z M9,3 h2 v10 h-2 z"/>
            </svg>
        </button>
    </div>

    <div id="brush-controls">
        <div id="brush-preview-container">
            <canvas id="brush-preview" width="21" height="21"></canvas>
        </div>
        <input type="range" id="brush-size" min="1" max="7" value="4">
    </div>

    <script src="js/config.js"></script>
    <script src="js/elements.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
